version: "3.9"

# ── SPC Training Docker Compose ───────────────────────────────────────────────
#
# PREFERRED — single command from Windows, does everything:
#
#   python run_training.py
#
# MANUAL steps (if you prefer fine-grained control):
#
#   docker compose -f docker-compose.train.yml build
#   docker compose -f docker-compose.train.yml run --rm extract
#   docker compose -f docker-compose.train.yml run --rm train
#
# OUTPUT: output/adapter/spc-adapter-lora.gguf  (commit this to git)

x-gpu-config: &gpu-config
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-common-env: &common-env
  environment:
    - PYTHONUNBUFFERED=1
    - IN_DOCKER=1
    - CONDA_DEFAULT_ENV=spc-train
    - CUDA_VISIBLE_DEVICES=0
    # Uncomment and set your HuggingFace token if you hit rate limits:
    # - HUGGING_FACE_HUB_TOKEN=hf_your_token_here

services:

  # ── extract: Generate JSONL dataset from PDFs (CPU only) ──────────────────
  extract:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /workspace/scripts/1_extract_dataset.py
    volumes:
      - ../:/books:ro
      - ./output:/output
    <<: *common-env

  # ── train: LoRA fine-tune Llama-3.2-3B (GPU required) ────────────────────
  train:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /workspace/scripts/2_train.py
    volumes:
      - ./output:/output
      - ./config:/workspace/config
      - ./scripts:/workspace/scripts
      - hf_cache:/root/.cache/huggingface
    <<: [*gpu-config, *common-env]

  # ── all: Full pipeline — extract then train (used by run_training.py) ─────
  all:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /workspace/run_training.py
    volumes:
      - ../:/books:ro
      - ./output:/output
      - ./config:/workspace/config
      - ./scripts:/workspace/scripts
      - hf_cache:/root/.cache/huggingface
    <<: [*gpu-config, *common-env]

volumes:
  # Persists the downloaded base model (~6 GB) across runs — saves re-download time
  hf_cache:
    name: spc_training_hf_cache
