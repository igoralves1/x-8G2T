version: "3.9"

# ── SPC Training Docker Compose ───────────────────────────────────────────────
#
# USAGE (run these commands from inside the spc-training/ folder on Windows):
#
#   Step 1 — Build the container (once):
#     docker compose -f docker-compose.train.yml build
#
#   Step 2 — Extract dataset from the PDF books:
#     docker compose -f docker-compose.train.yml run --rm extract
#
#   Step 3 — Train the model (uses RTX 5080 GPU):
#     docker compose -f docker-compose.train.yml run --rm train
#
#   Step 4 — Check output:
#     ls output/adapter/
#     # You should see: spc-adapter-lora.gguf  (this is what goes to Jetson)

x-gpu-config: &gpu-config
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-volumes: &common-volumes
  volumes:
    # Read-only: the PDF books are one level up from spc-training/
    - ../:/books:ro
    # Read-write: training output (dataset, adapter, checkpoints)
    - ./output:/output

services:

  # ── Service 1: Extract training dataset from PDFs ──────────────────────────
  # This reads the PDF books and generates spc-qa-pairs.jsonl
  # No GPU needed — runs on CPU only
  extract:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scripts/1_extract_dataset.py
    volumes:
      - ../:/books:ro
      - ./output:/output
    environment:
      - PYTHONUNBUFFERED=1

  # ── Service 2: Fine-tune the model (GPU required) ──────────────────────────
  # Reads output/spc-qa-pairs.jsonl and trains Llama-3.2-3B with LoRA
  # Saves the trained adapter to output/adapter/spc-adapter-lora.gguf
  train:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scripts/2_train.py
    <<: *gpu-config
    volumes:
      - ./output:/output
      - ./config:/workspace/config
      # HuggingFace cache so the base model is only downloaded once
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0
      # Set your HuggingFace token if needed for model access
      # - HUGGING_FACE_HUB_TOKEN=hf_your_token_here

  # ── Service 3: Run both extract and train in sequence ─────────────────────
  # Convenience: runs everything in one command
  # docker compose -f docker-compose.train.yml run --rm all
  all:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      bash -c "
        echo '=== Step 1/2: Extracting dataset from PDFs ===' &&
        python scripts/1_extract_dataset.py &&
        echo '=== Step 2/2: Training model ===' &&
        python scripts/2_train.py
      "
    <<: *gpu-config
    volumes:
      - ../:/books:ro
      - ./output:/output
      - ./config:/workspace/config
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0

volumes:
  # Persists the downloaded base model (~6GB) so it is not re-downloaded each run
  huggingface_cache:
    name: spc_training_hf_cache
