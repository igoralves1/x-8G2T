# =============================================================================
# X-8G2T : Agentic Edge-AI IoT Platform  -  Jetson Orin Nano
# -----------------------------------------------------------------------------
# Single docker-compose stack that runs the ENTIRE Jetson-board environment.
# The only thing OUTSIDE this file is the fleet of edge devices that publish
# telemetry over MQTT/TLS to the `emqx` broker.
#
# GPU services (CUDA is already installed on the host JetPack image):
#   - llm-server      : llama.cpp server (text reasoning LLM)
#   - vlm-server      : llama.cpp server (vision-language model for cameras)
#   - embeddings      : llama.cpp server (embedding model for RAG)
# CPU services do the orchestration, storage, streaming and visualization.
#
# Bring everything up:   docker compose up -d --build
# Bring a subset up:     docker compose --profile core up -d
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

# Re-usable GPU reservation for the three inference servers.
x-gpu: &gpu-reservation
  runtime: nvidia
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

networks:
  iot-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  iotdb_data:
  kafka_data:
  qdrant_data:
  grafana_data:
  superset_data:
  models:          # shared GGUF model cache — bind-mounted from ./models/
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/models
  emqx_data:

services:

  # ==========================================================================
  # 1. EMQX  -  secure MQTT entry point for the edge devices
  # ==========================================================================
  emqx:
    image: emqx/emqx:5.8.4
    container_name: emqx
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all"]
    networks: [iot-net]
    ports:
      - "1883:1883"     # MQTT (internal / dev only)
      - "8883:8883"     # MQTT over TLS  <-- devices connect here
      - "8083:8083"     # MQTT over WebSocket
      - "8084:8084"     # MQTT over WebSocket TLS
      - "18083:18083"   # Management dashboard
    env_file: [.env]
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: emqx
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
      EMQX_LISTENERS__SSL__DEFAULT__BIND: "0.0.0.0:8883"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE: /opt/emqx/etc/certs/ca.crt
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: /opt/emqx/etc/certs/server.crt
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE: /opt/emqx/etc/certs/server.key
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__VERIFY: verify_peer
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__FAIL_IF_NO_PEER_CERT: "false"
    volumes:
      - ./ssl:/opt/emqx/etc/certs:ro
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================================================
  # 2. Apache Kafka  -  durable telemetry buffer (KRaft, no Zookeeper)
  # ==========================================================================
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all"]
    networks: [iot-net]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================================================
  # 3. Apache Flink  -  real-time stream processing & rule-based alerting
  # ==========================================================================
  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    image: x8g2t/flink:1.18
    container_name: flink-jobmanager
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all"]
    networks: [iot-net]
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 2
    env_file: [.env]
    volumes:
      - ./flink/jobs:/opt/flink/usrlib
    depends_on:
      kafka:
        condition: service_started

  flink-taskmanager:
    image: x8g2t/flink:1.18
    container_name: flink-taskmanager
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all"]
    networks: [iot-net]
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    env_file: [.env]
    volumes:
      - ./flink/jobs:/opt/flink/usrlib
    depends_on:
      flink-jobmanager:
        condition: service_started

  # ==========================================================================
  # 3b. MQTT -> Kafka bridge  -  feeds device telemetry into the Kafka topic
  # ==========================================================================
  mqtt-kafka-bridge:
    build:
      context: ./services/mqtt-kafka-bridge
      dockerfile: Dockerfile
    image: x8g2t/mqtt-kafka-bridge:latest
    container_name: mqtt-kafka-bridge
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all"]
    networks: [iot-net]
    environment:
      MQTT_HOST: emqx
      MQTT_PORT: "1883"
      MQTT_TOPIC: "telemetry/#"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: raw-telemetry
    depends_on:
      emqx:
        condition: service_started
      kafka:
        condition: service_started

  # ==========================================================================
  # 4. Apache IoTDB  -  time-series store for raw + aggregated telemetry
  # ==========================================================================
  iotdb:
    image: apache/iotdb:1.3.2-standalone
    container_name: iotdb
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all"]
    networks: [iot-net]
    ports:
      - "6667:6667"     # RPC
      - "18080:18080"   # REST API (used by the agents' tools)
    environment:
      - enable_rest_service=true
      - cn_internal_address=iotdb
      - dn_rpc_address=iotdb
      - dn_internal_address=iotdb
    volumes:
      - iotdb_data:/iotdb/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u root:root http://localhost:18080/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8

  # ==========================================================================
  # 5. PostgreSQL + pgvector  -  metadata, alarms, users, agent memory
  # ==========================================================================
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: x8g2t/postgres:16-pgvector
    container_name: postgres
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all"]
    networks: [iot-net]
    ports:
      - "5432:5432"
    env_file: [.env]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==========================================================================
  # 6. Qdrant  -  vector database powering the RAG knowledge base
  # ==========================================================================
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: qdrant
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all", "ai"]
    networks: [iot-net]
    ports:
      - "6333:6333"     # REST / dashboard
      - "6334:6334"     # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================================================
  # 7. LLM server (GPU)  -  text reasoning model, OpenAI-compatible API
  # ==========================================================================
  llm-server:
    build:
      context: ./services/llama-cpp
      dockerfile: Dockerfile.jetson
    image: x8g2t/llamacpp:jetson          # built once, reused by all 3 servers
    container_name: llm-server
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all", "ai"]
    networks: [iot-net]
    <<: *gpu-reservation
    ports:
      - "8090:8080"
    env_file: [.env]
    environment:
      SERVER_MODE: llm
      MODEL_FILE: ${LLM_MODEL_FILE}
      NGL: "999"            # offload all layers to the Ampere GPU
      CTX_SIZE: "8192"
      PARALLEL: "2"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ==========================================================================
  # 8. VLM server (GPU)  -  vision-language model for camera frame analysis
  # ==========================================================================
  vlm-server:
    build:
      context: ./services/llama-cpp
      dockerfile: Dockerfile.jetson
    image: x8g2t/llamacpp:jetson
    container_name: vlm-server
    restart: unless-stopped
    logging: *default-logging
    profiles: ["ai", "all"]
    networks: [iot-net]
    <<: *gpu-reservation
    ports:
      - "8092:8080"
    env_file: [.env]
    environment:
      SERVER_MODE: vlm
      MODEL_FILE: ${VLM_MODEL_FILE}
      MMPROJ_FILE: ${VLM_MMPROJ_FILE}
      NGL: "999"
      CTX_SIZE: "4096"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ==========================================================================
  # 9. Embeddings server (GPU)  -  vectorizes text for RAG ingest + retrieval
  # ==========================================================================
  embeddings:
    build:
      context: ./services/llama-cpp
      dockerfile: Dockerfile.jetson
    image: x8g2t/llamacpp:jetson
    container_name: embeddings
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all", "ai"]
    networks: [iot-net]
    <<: *gpu-reservation
    ports:
      - "8091:8080"
    env_file: [.env]
    environment:
      SERVER_MODE: embed
      MODEL_FILE: ${EMBED_MODEL_FILE}
      NGL: "999"
      CTX_SIZE: "8192"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ==========================================================================
  # 9a. Observability server  -  board + container health/metrics API
  #     REST:  http://host:8001/api/metrics
  #     WS:    ws://host:8001/ws  (full snapshot pushed every 1 second)
  # ==========================================================================
  observability:
    build:
      context: ./services/observability
      dockerfile: Dockerfile
    image: x8g2t/observability:latest
    container_name: observability
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all"]
    networks: [iot-net]
    ports:
      - "8001:8001"
    privileged: true                                    # nsenter needs this for tegrastats (GPU util)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Docker API
    pid: host                                           # psutil + /proc/1/net/dev read host metrics
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================================================
  # 9b. SPC MCP server  -  local Model Context Protocol server exposing
  #     Statistical Process Control / Six Sigma tools (control charts,
  #     Nelson/Western-Electric rules, Cp/Cpk capability, chart rendering).
  # ==========================================================================
  spc-mcp:
    build:
      context: ./services/spc-mcp
      dockerfile: Dockerfile
    image: x8g2t/spc-mcp:latest
    container_name: spc-mcp
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all", "ai"]
    networks: [iot-net]
    ports:
      - "8765:8765"
    environment:
      HOST: 0.0.0.0
      PORT: "8765"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/8765' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================================================
  # 10. Agent Orchestrator  -  the multi-agent "brain" + RAG pipeline (FastAPI)
  # ==========================================================================
  agent-orchestrator:
    build:
      context: ./services/agent-orchestrator
      dockerfile: Dockerfile.jetson
    image: x8g2t/agent-orchestrator:jetson
    container_name: agent-orchestrator
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all", "ai"]
    networks: [iot-net]
    ports:
      - "8000:8000"
    env_file: [.env]
    environment:
      POSTGRES_HOST: postgres
      IOTDB_HOST: iotdb
      IOTDB_REST_PORT: "18080"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_URL: http://qdrant:6333
      LLM_BASE_URL: http://llm-server:8080/v1
      VLM_BASE_URL: http://vlm-server:8080/v1
      EMBED_BASE_URL: http://embeddings:8080/v1
      SPC_MCP_URL: http://spc-mcp:8765/mcp
      LOG_LEVEL: INFO
    volumes:
      - ./services/agent-orchestrator/app:/app/app
      - ./knowledge-base:/knowledge-base:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      llm-server:
        condition: service_started
      embeddings:
        condition: service_started
      spc-mcp:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ==========================================================================
  # 11. RAG Indexer  -  one-shot/recurring job that loads knowledge-base + DB
  #     facts into Qdrant. Runs, indexes, then exits (restart: "no").
  # ==========================================================================
  rag-indexer:
    build:
      context: ./services/rag-indexer
      dockerfile: Dockerfile.jetson
    image: x8g2t/rag-indexer:jetson
    container_name: rag-indexer
    restart: "no"
    logging: *default-logging
    profiles: ["ai", "all", "index"]
    networks: [iot-net]
    env_file: [.env]
    environment:
      QDRANT_URL: http://qdrant:6333
      EMBED_BASE_URL: http://embeddings:8080/v1
      POSTGRES_HOST: postgres
      KNOWLEDGE_BASE_DIR: /knowledge-base
      BOOKS_DIR: /books
      KB_DOMAIN: ops
      BOOKS_DOMAIN: spc
    volumes:
      - ./knowledge-base:/knowledge-base:ro
      - ./books:/books:ro
    depends_on:
      qdrant:
        condition: service_started
      embeddings:
        condition: service_started

  # ==========================================================================
  # 12. Grafana  -  operational dashboards (telemetry, alarms, AI insights)
  # ==========================================================================
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    logging: *default-logging
    profiles: ["core", "all"]
    networks: [iot-net]
    ports:
      - "3000:3000"
    env_file: [.env]
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy

  # ==========================================================================
  # 13. Apache Superset  -  BI / advanced analytics
  # ==========================================================================
  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: x8g2t/superset:4.0
    container_name: superset
    restart: unless-stopped
    logging: *default-logging
    profiles: ["all", "bi"]
    networks: [iot-net]
    ports:
      - "8088:8088"
    env_file: [.env]
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USER}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - superset_data:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
